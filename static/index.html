<!DOCTYPE html>
<html>
<head>
<title>Classifier</title>

<style>
body { font-family: Arial; text-align:center; }

.spinner{
border:5px solid #ddd;
border-top:5px solid blue;
border-radius:50%;
width:40px;height:40px;
animation:spin 1s linear infinite;
margin:auto;
}
@keyframes spin{100%{transform:rotate(360deg)}}

.low{ background:#ffe5e5; }

table{ width:100%; border-collapse:collapse; }
td,th{ border:1px solid #ddd; padding:8px; }

</style>
</head>

<body>

<h2>Upload Excel</h2>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<div id="loader" style="display:none;">
<div class="spinner"></div>
<p id="p">0%</p>
</div>

<div id="status"></div>

<div id="tableDiv" style="display:none;">
<table>
<thead>
<tr>
<th>Description</th>
<th>Predicted</th>
<th>Confidence</th>
<th>Correct</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<br>
<button onclick="submit()">✅ Submit Corrections</button>
</div>

<script>
async function upload(){

let file=document.getElementById("file").files[0];

let fd=new FormData();
fd.append("file",file);

let loader=document.getElementById("loader");
loader.style.display="block";

let p=0;
let int=setInterval(()=>{
if(p<90){p+=10;document.getElementById("p").innerText=p+"%";}
},300);

let res=await fetch("/upload",{method:"POST",body:fd});
let r=await res.json();

clearInterval(int);
document.getElementById("p").innerText="100%";
loader.style.display="none";

// ✅ Download FIRST
document.getElementById("status").innerHTML=
`✅ Done<br><br>
<button onclick="window.open('${r.download_url}')">
Download Excel (Highlighted)
</button><br><br>
Review / correct below:`;

// ✅ THEN show table
show(r.data);
}

function show(data){

let t=document.getElementById("tbody");
t.innerHTML="";

data.forEach((r,i)=>{

let cls=r.Confidence<0.7?"low":"";

t.innerHTML+=`
<tr class="${cls}">
<td>${r.description||r.Description}</td>
<td>${r.PredictedCode}</td>
<td>${r.Confidence}</td>
<td><input id="c${i}" value="${r.PredictedCode}"></td>
</tr>`;
});

document.getElementById("tableDiv").style.display="block";
}

async function submit(){

let rows=document.querySelectorAll("#tbody tr");

for(let i=0;i<rows.length;i++){

let desc=rows[i].children[0].innerText;
let code=document.getElementById("c"+i).value;

await fetch("/feedback",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({description:desc,code:code})
});
}

await fetch("/retrain",{method:"POST"});

alert("✅ Learning completed!");
}
</script>

</body>
</html>
