<!DOCTYPE html>
<html>
<head>
<title>AI Classifier</title>

<style>
body { font-family:"Segoe UI"; margin:0; background:#f4f6f9; }

.header {
    background:#0078d4;
    color:white;
    padding:15px;
    font-size:20px;
}

.container {
    display:flex;
    justify-content:center;
    margin-top:30px;
}

.card {
    background:white;
    padding:25px;
    width:700px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* Drag & Drop */
.drop-zone {
    border:2px dashed #0078d4;
    padding:30px;
    text-align:center;
    cursor:pointer;
}

.drop-zone.dragover {
    background:#e6f2ff;
}

/* Table */
table { width:100%; border-collapse:collapse; margin-top:20px; }
td,th { padding:8px; border:1px solid #ddd; }
th { background:#0078d4; color:white; }

/* Colors */
.low { background:#fff3cd; }
.changed input { background:#c6f6c6; }

.spinner {
    border:5px solid #ddd;
    border-top:5px solid #0078d4;
    border-radius:50%;
    width:40px;height:40px;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="header">📊 AI Expense Classifier</div>

<div class="container">
<div class="card">

<div id="dropZone" class="drop-zone">
Drag & Drop file or click
<input type="file" id="fileInput" style="display:none;">
</div>

<p id="fileName"></p>

<button onclick="upload()">Upload</button>

<div id="loader" style="display:none;">
<div class="spinner"></div>
<p id="progress">0%</p>
</div>

<div id="status"></div>

<div id="tableDiv" style="display:none;">
<table>
<thead>
<tr>
<th>Description</th>
<th>Predicted</th>
<th>Confidence</th>
<th>Correct</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<br>
<button onclick="submitCorrections()">✅ Submit Changes</button>
<button onclick="approveAll()">✅ Approve All</button>
</div>

</div>
</div>

<script>
let selectedFile=null;

const dz=document.getElementById("dropZone");
const fi=document.getElementById("fileInput");

dz.onclick=()=>fi.click();

fi.addEventListener("change",e=>{
selectedFile=e.target.files[0];
document.getElementById("fileName").innerText=selectedFile.name;
});

dz.addEventListener("dragover",e=>{
e.preventDefault();
dz.classList.add("dragover");
});
dz.addEventListener("dragleave",()=>dz.classList.remove("dragover"));
dz.addEventListener("drop",e=>{
e.preventDefault();
selectedFile=e.dataTransfer.files[0];
document.getElementById("fileName").innerText=selectedFile.name;
});

// Upload
async function upload(){

if(!selectedFile){alert("Select file");return;}

let fd=new FormData();
fd.append("file",selectedFile);

let loader=document.getElementById("loader");
loader.style.display="block";

let p=0;
let int=setInterval(()=>{
if(p<90){p+=10;document.getElementById("progress").innerText=p+"%";}
},300);

let res=await fetch("/upload",{method:"POST",body:fd});
let r=await res.json();

clearInterval(int);
loader.style.display="none";

// Download first
document.getElementById("status").innerHTML=
`✅ Done<br>
<button onclick="window.open('${r.download_url}')">
Download Excel
</button><br>
Showing <80% only`;

showTable(r.data);
}

function showTable(data){

let t=document.getElementById("tbody");
t.innerHTML="";

let filtered=data.filter(r=>r.Confidence<0.8);

filtered.forEach((r,i)=>{
t.innerHTML+=`
<tr class="low">
<td>${r.description||r.Description}</td>
<td>${r.PredictedCode}</td>
<td>${r.Confidence}</td>
<td>
<input id="c${i}" value="${r.PredictedCode}" 
data-original="${r.PredictedCode}"
oninput="markChanged(this)">
</td>
</tr>`;
});

document.getElementById("tableDiv").style.display="block";
}

function markChanged(input){
let orig=input.dataset.original;
if(input.value!=orig)
input.closest("tr").classList.add("changed");
else
input.closest("tr").classList.remove("changed");
}

async function submitCorrections(){

let inputs=document.querySelectorAll("#tbody input");
let count=0;

for(let input of inputs){
if(input.value!=input.dataset.original){

let desc=input.closest("tr").children[0].innerText;

await fetch("/feedback",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({description:desc,code:input.value})
});

count++;
}
}

await fetch("/retrain",{method:"POST"});
alert(`✅ ${count} rows updated`);
}

function approveAll(){
alert("✅ All approved");
}
</script>

</body>
</html>
